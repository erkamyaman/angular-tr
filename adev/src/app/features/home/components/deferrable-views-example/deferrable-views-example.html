<div class="two-column-step">
  <div class="step-description">
    <div class="header">Ertelenebilir Görünümler</div>
    <div class="description">
      Ertelenebilir görünümler (<code>&#64;defer</code> blokları olarak da bilinir), bir sayfanın
      ilk render'ı için kesinlikle gerekli olmayan kodun yüklenmesini erteleyerek uygulamanızın
      başlangıç bundle boyutunu azaltır.
    </div>

    <button
      class="docs-primary-btn"
      [attr.text]="'Ertelenmiş yükleme hakkında daha fazla bilgi edinin'"
      routerLink="/guide/templates/defer"
    >
      Ertelenmiş yükleme hakkında daha fazla bilgi edinin
    </button>
  </div>

  <div class="step-code">
    <div class="code-block">
      <div class="code-header">
        <span>data-visualization-page.html</span>
        <span class="copy-icon"></span>
      </div>

      <adev-code-block [code]="exampleHtml" language="angular-html" />
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>data-visualization-page.ts</span>
        <span class="copy-icon"></span>
      </div>

      <adev-code-block [code]="exampleTs" />
    </div>
  </div>
</div>
