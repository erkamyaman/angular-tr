@if (!hasAccepted()) {
  <div class="docs-cookies-popup docs-invert-mode">
    <p>
      Bu site, hizmetlerini sunmak ve trafiği analiz etmek için Google çerezlerini kullanmaktadır.
    </p>

    <div>
      <a
        href="https://policies.google.com/technologies/cookies"
        target="_blank"
        rel="noopener"
        class="docs-primary-btn"
        aria-label="Google'ın çerezleri nasıl kullandığı hakkında daha fazla bilgi edinin"
        text="Daha fazla bilgi"
      >
        Daha fazla bilgi
      </a>

      <button
        type="button"
        (click)="accept()"
        class="docs-primary-btn"
        text="Tamam, Anladım"
        aria-label="Tamam, Anladım"
      >
        Tamam, Anladım
      </button>
    </div>
  </div>
}
